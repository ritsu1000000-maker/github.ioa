<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毎日消える匿名X Pro (GitHub連携版)</title>
    <style>
        :root {
            --bg-color: #000000;
            --container-bg: #000000;
            --border-color: #2f3336;
            --text-main: #e7e9ea;
            --text-muted: #71767b;
            --twitter-blue: #1d9bf0;
            --twitter-blue-hover: #1a8cd8;
            --like-color: #f91880;
            --dislike-color: #3b82f6;
            --fuck-color: #eab308;
            --card-bg: #16181c;
            --record-active: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding-bottom: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ★ ログイン画面のスタイル */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .header-info {
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 600px;
            padding: 14px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-size: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            width: 100%;
            border-bottom: 1px solid var(--border-color);
            background: #000;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-weight: bold;
            color: var(--text-muted);
            font-size: 14px;
            transition: color 0.2s;
        }
        .tab.active {
            color: var(--text-main);
            border-bottom: 4px solid var(--twitter-blue);
        }

        .sidebar-widget {
            padding: 12px 16px;
            background: var(--card-bg);
            margin: 10px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .widget-title {
            font-size: 15px;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--twitter-blue);
        }
        .widget-item {
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(47, 51, 54, 0.4);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .widget-item:last-child { border-bottom: none; }
        .widget-item:hover { color: var(--twitter-blue); }

        .container {
            width: 100%;
            max-width: 600px;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            min-height: 100vh;
            box-sizing: border-box;
            background-color: var(--container-bg);
        }

        .page { display: none; }
        .page.active { display: block; }

        .post-box, .reply-box, .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .post-box textarea, .reply-box textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 18px;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .post-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            border-top: 1px solid rgba(47, 51, 54, 0.5);
            padding-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .toolbar-icons {
            display: flex;
            gap: 16px;
            color: var(--twitter-blue);
            font-size: 20px;
            align-items: center;
        }

        .toolbar-icons label, .toolbar-icons span {
            cursor: pointer;
            transition: opacity 0.2s;
            user-select: none;
        }
        .toolbar-icons label:hover, .toolbar-icons span:hover { opacity: 0.7; }

        .record-btn {
            font-size: 18px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .record-btn.recording {
            color: var(--record-active);
            animation: pulse 1.2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .media-preview-container {
            display: none;
            position: relative;
            margin-top: 10px;
            max-height: 300px;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: #000;
            padding: 10px;
            box-sizing: border-box;
        }
        .media-preview-container.active { display: block; }
        .media-preview-container img, .media-preview-container video { width: 100%; height: auto; max-height: 280px; border-radius: 12px; display: block; object-fit: contain; }
        .media-preview-container audio { width: 100%; margin-top: 10px; }
        .media-preview-close {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.7); border: none; color: white;
            border-radius: 50%; width: 30px; height: 30px; cursor: pointer;
            font-weight: bold; font-size: 14px; z-index: 5;
        }

        .poll-creator-box {
            display: none;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 14px;
            margin-top: 10px;
            flex-direction: column;
            gap: 8px;
        }
        .poll-creator-box.active { display: flex; }
        .poll-option-input {
            background: #000; border: 1px solid var(--border-color);
            border-radius: 8px; padding: 10px; color: white; outline: none; font-size: 14px;
        }
        .poll-option-input:focus { border-color: var(--twitter-blue); }

        .attached-media {
            margin-top: 12px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            max-height: 360px;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .attached-media img, .attached-media video { width: 100%; height: auto; max-height: 360px; object-fit: contain; display: block; }
        .attached-media audio { width: 100%; padding: 10px; box-sizing: border-box; }

        .poll-display-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: var(--card-bg);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
        }
        .poll-row {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .poll-row:hover { background: rgba(255,255,255,0.07); }
        .poll-bg-bar {
            position: absolute; top: 0; left: 0; bottom: 0;
            background: rgba(29, 155, 240, 0.15);
            z-index: 0; transition: width 0.6s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        .poll-text { z-index: 1; position: relative; }
        .poll-pct { z-index: 1; position: relative; color: var(--twitter-blue); }

        .btn-primary {
            background-color: var(--twitter-blue); color: white; border: none;
            padding: 8px 18px; border-radius: 9999px; font-weight: bold;
            font-size: 15px; cursor: pointer; transition: background 0.2s;
        }
        .btn-primary:hover { background-color: var(--twitter-blue-hover); }

        .btn-follow {
            background-color: #fff; color: #000; border: 2px solid transparent;
            padding: 6px 14px; border-radius: 9999px; font-weight: bold;
            font-size: 13px; cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .btn-follow:hover { opacity: 0.85; transform: scale(1.03); }
        .btn-follow.following {
            background-color: transparent; color: #fff;
            border: 1px solid var(--border-color);
        }
        .btn-follow.following:hover {
            background-color: rgba(249, 24, 128, 0.1);
            border-color: #f91880;
            color: #f91880;
        }

        .btn-dm {
            background-color: transparent; color: var(--twitter-blue);
            border: 1px solid var(--twitter-blue);
            padding: 6px 14px; border-radius: 9999px; font-weight: bold;
            font-size: 13px; cursor: pointer; transition: background 0.2s;
            white-space: nowrap;
        }
        .btn-dm:hover { background-color: rgba(29, 155, 240, 0.1); }

        .inline-action-btn {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 9999px;
            cursor: pointer;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .inline-action-btn:hover { border-color: var(--twitter-blue); color: var(--twitter-blue); }
        .inline-action-btn.following {
            border-color: var(--border-color);
            color: var(--text-muted);
        }
        .inline-action-btn.following:hover {
            border-color: #f91880;
            color: #f91880;
        }
        .inline-dm-btn {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 9999px;
            cursor: pointer;
            border: 1px solid var(--twitter-blue);
            background: transparent;
            color: var(--twitter-blue);
            transition: all 0.2s;
        }
        .inline-dm-btn:hover { background: rgba(29,155,240,0.1); }

        .schedule-area {
            display: flex; align-items: center; gap: 8px;
            font-size: 12px; color: var(--text-muted);
        }
        .schedule-area input {
            background-color: #16181c; border: 1px solid var(--border-color);
            border-radius: 6px; color: white; padding: 4px 6px; outline: none;
        }

        .quote-preview {
            display: none; background-color: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 12px;
            padding: 12px; margin-bottom: 12px; position: relative;
        }
        .quote-preview.active { display: block; }
        .quote-preview-close {
            position: absolute; top: 8px; right: 12px;
            background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer;
        }

        .item-row {
            padding: 16px; border-bottom: 1px solid var(--border-color);
            display: flex; gap: 12px; cursor: pointer; transition: background-color 0.2s;
        }
        .item-row:hover { background-color: rgba(255, 255, 255, 0.03); }
        
        .avatar {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
            color: #fff; cursor: pointer; transition: opacity 0.2s;
            user-select: none;
        }
        .avatar:hover { opacity: 0.85; }
        
        .content-body { flex: 1; min-width: 0; }
        .meta-info { color: var(--text-muted); font-size: 14px; }
        .user-name { font-weight: bold; color: var(--text-main); margin-right: 4px; cursor: pointer; }
        .user-name:hover { text-decoration: underline; }
        
        .message-text {
            margin-top: 4px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; font-size: 15px;
        }

        .action-bar { display: flex; justify-content: space-between; max-width: 440px; margin-top: 12px; color: var(--text-muted); font-size: 13px; }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; transition: color 0.2s; padding: 4px 8px; border-radius: 9999px; }
        .action-btn:hover { background-color: rgba(29, 155, 240, 0.1); color: var(--twitter-blue); }
        .action-btn.liked { color: var(--like-color); font-weight: bold; }
        .action-btn.disliked { color: var(--dislike-color); font-weight: bold; }
        .action-btn.fucked { color: var(--fuck-color); font-weight: bold; }
        .action-views { color: var(--text-muted); cursor: default; }

        .embedded-quote-card { background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-top: 10px; }
        .reply-row { padding-left: 40px; border-bottom: 1px solid var(--border-color); }

        .profile-header { border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        .profile-banner { height: 120px; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .profile-avatar-wrapper { padding: 0 16px; margin-top: -30px; display: flex; justify-content: space-between; align-items: flex-end; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 4px solid #000; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; color: white; cursor: pointer; transition: transform 0.2s; }
        .profile-avatar:hover { transform: scale(1.05); }
        .profile-details { padding: 12px 16px 0 16px; }
        .profile-id { color: var(--text-muted); font-size: 14px; margin-bottom: 12px; }
        .profile-bio { font-size: 15px; color: var(--text-main); line-height: 1.5; }

        .follow-stats {
            display: flex; gap: 20px; padding: 12px 16px 0;
            font-size: 14px; color: var(--text-muted);
        }
        .follow-stat-num { font-weight: bold; color: var(--text-main); }

        .profile-edit-box { display: none; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; margin: 10px 16px 0 16px; flex-direction: column; gap: 10px; }
        .profile-edit-box.active { display: flex; }
        .profile-edit-input { background: #000; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px; color: white; outline: none; font-size: 14px; }
        .color-picker-container { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.selected { border-color: white; }

        .search-box { padding: 16px; border-bottom: 1px solid var(--border-color); }
        .search-inner { display: flex; gap: 8px; }
        .search-inner input { flex: 1; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 9999px; padding: 10px 16px; color: white; outline: none; }

        .dm-header { padding: 14px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 12px; font-weight: bold; position: sticky; top: 0; background: #000; z-index: 10; }
        .dm-messages-container { height: 55vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
        .dm-bubble { max-width: 70%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; word-break: break-all; }
        .dm-bubble.me { background-color: var(--twitter-blue); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .dm-bubble.other { background-color: #2f3336; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
        .dm-bubble-time { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; text-align: right; }
        .dm-input-area {
            position: sticky; bottom: 0; background: #000;
            padding: 12px 16px; border-top: 1px solid var(--border-color);
            display: flex; gap: 10px; align-items: flex-end;
        }
        .dm-input-area textarea {
            flex: 1; background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 10px 14px; color: white; outline: none;
            font-size: 15px; font-family: inherit; resize: none; max-height: 100px;
            transition: border-color 0.2s;
        }
        .dm-input-area textarea:focus { border-color: var(--twitter-blue); }

        .toast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: var(--twitter-blue); color: white;
            padding: 10px 20px; border-radius: 9999px;
            font-size: 14px; font-weight: bold;
            opacity: 0; transition: opacity 0.3s;
            z-index: 999; pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; max-width: 600px; background-color: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; padding: 14px 0; z-index: 10; }
        .nav-item { color: var(--text-muted); cursor: pointer; font-weight: bold; font-size: 15px; position: relative; text-align: center; flex: 1; user-select: none; }
        .nav-item.active { color: var(--twitter-blue); }
        .badge { position: absolute; top: -6px; right: 20%; background-color: var(--twitter-blue); color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; display: none; }
        .tweet-link { color: var(--twitter-blue); text-decoration: none; cursor: pointer; }
        .tweet-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--twitter-blue); margin-bottom:10px;">毎日消える匿名X Pro</h1>
        <p style="color:var(--text-muted); margin-bottom:30px;">GitHubアカウントでログインして世界と繋がろう</p>
        <button onclick="loginWithGitHub()" class="btn-primary" style="font-size:18px; padding:12px 24px; display:flex; align-items:center; gap:8px;">
            <svg height="24" aria-hidden="true" viewBox="0 0 16 16" version="1.1" width="24" data-view-component="true" fill="currentColor">
                <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
            </svg>
            GitHubでログイン
        </button>
    </div>

    <div class="toast" id="toast-msg"></div>

    <div class="header-info">
        👤 ログイン中: <span id="my-today-name" style="color:var(--twitter-blue);">...</span>
    </div>

    <div class="container">
        
        <div id="page-timeline" class="page active">
            <div class="tabs">
                <div class="tab active" id="tab-all" onclick="switchTimelineTab('all')">みんな</div>
                <div class="tab" id="tab-follow" onclick="switchTimelineTab('follow')">フォロー中</div>
                <div class="tab" id="tab-rank" onclick="switchTimelineTab('rank')">ランキング</div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
                <div class="sidebar-widget">
                    <div class="widget-title">🔥 最新スレ3</div>
                    <div id="widget-threads"></div>
                </div>
                <div class="sidebar-widget">
                    <div class="widget-title">💬 最新レス5</div>
                    <div id="widget-replies"></div>
                </div>
            </div>

            <div class="post-box">
                <div id="quote-preview-box" class="quote-preview">
                    <button class="quote-preview-close" onclick="cancelQuote()">✕</button>
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: bold; margin-bottom: 4px;">🔄 引用するポスト:</div>
                    <div id="quote-preview-text" style="font-size: 14px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                </div>

                <textarea id="tweet-input" placeholder="今どうしてる？（声やMP3/MP4も世界に届く！）" rows="3"></textarea>

                <div id="media-preview-wrap" class="media-preview-container">
                    <button class="media-preview-close" onclick="clearSelectedMedia()">✕</button>
                    <div id="preview-content"></div>
                </div>

                <div id="poll-creator" class="poll-creator-box">
                    <input type="text" class="poll-option-input" id="poll-opt-1" placeholder="選択肢 1">
                    <input type="text" class="poll-option-input" id="poll-opt-2" placeholder="選択肢 2">
                    <input type="text" class="poll-option-input" id="poll-opt-3" placeholder="選択肢 3 (任意)">
                    <input type="text" class="poll-option-input" id="poll-opt-4" placeholder="選択肢 4 (任意)">
                </div>

                <div class="post-toolbar">
                    <div class="toolbar-icons">
                        <label for="media-upload-input" title="画像・動画・音声をアップロード">📁</label>
                        <input type="file" id="media-upload-input" accept="image/*,video/mp4,audio/mp3,audio/mpeg" style="display:none;" onchange="previewMedia(this)">
                        <span id="voice-record-btn" class="record-btn" onclick="toggleVoiceRecording()" title="声を録音して送る">🎙️</span>
                        <span onclick="togglePollCreator()">📊</span>
                    </div>
                    <div class="schedule-area">
                        <span>⏳ 消滅(分後):</span>
                        <input type="number" id="post-expire-minutes" min="1" placeholder="空欄で1日" style="width:70px;">
                        <span>⏰ 予約:</span>
                        <input type="datetime-local" id="post-schedule-time">
                    </div>
                    <button id="post-btn" class="btn-primary" onclick="submitTweet()">ポスト</button>
                </div>
            </div>
            <div id="tweet-list"></div>
        </div>

        <div id="page-post-detail" class="page">
            <div style="padding: 12px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <button onclick="backToTimelineFromDetail()" style="background: none; border: none; color: var(--twitter-blue); font-size: 16px; cursor: pointer; font-weight: bold;">← スレッドに戻る</button>
                <button id="detail-share-link-btn" class="inline-dm-btn" style="padding: 6px 14px; font-size: 13px;" onclick="copyPostDirectLink()">🔗 リンクをコピー</button>
            </div>
            <div id="detail-main-post"></div>
            <div class="reply-box">
                <textarea id="reply-input" placeholder="返信をポスト..." rows="2"></textarea>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { 
    getFirestore, collection, doc, setDoc, addDoc, getDoc, getDocs, updateDoc, 
    query, orderBy, limit, onSnapshot, arrayUnion, arrayRemove, where 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
// ★ 新たに Firebase Auth をインポート
import { 
    getAuth, signInWithPopup, GithubAuthProvider, signOut, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

// 【重要】ここにあなたのFirebase設定情報を貼り付けてください
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

// Firebase の初期化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const githubProvider = new GithubAuthProvider();

const names = ["そよ風のタヌキ", "読書するキツネ", "宇宙のトースト", "秘密のハッカー", "居眠りパンダ", "深海のクラゲ"];
const colors = ["#ff5733", "#33ff57", "#3357ff", "#f333ff", "#fff333", "#33fff3"];
const todayStr = new Date().toISOString().split('T')[0];

let userId = ""; // AuthのUIDが入ります
let myCustomInfo = { name: "読み込み中...", color: "#1d9bf0", bio: "", avatarUrl: "" };
let allPostsCache = [];
let allUsersCache = {};
let globalFollows = [];
let globalFollowersCount = 0;

let currentSelectedPostId = "";
let selectedQuotePostId = "";
let attachedMediaData = { type: "", src: "" };
let currentTimelineTab = "all";
let currentActiveDmPartnerId = "";
let currentProfileId = "";

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let dmUnsubscribe = null;
let hasInitialRouted = false;
let isAppInitialized = false;

window.showToast = function(msg, duration = 2500) {
    const t = document.getElementById('toast-msg');
    if(t) {
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), duration);
    }
}

// ==========================================
// 🔒 GitHub認証の処理
// ==========================================
window.loginWithGitHub = async function() {
    try {
        await signInWithPopup(auth, githubProvider);
    } catch(error) {
        console.error("ログインエラー:", error);
        alert("ログインに失敗しました: " + error.message);
    }
}

window.logoutApp = async function() {
    if(confirm("ログアウトしますか？")) {
        await signOut(auth);
        window.location.reload();
    }
}

// ログイン状態の監視
onAuthStateChanged(auth, async (user) => {
    if (user) {
        // ログイン成功時
        document.getElementById('login-screen').style.display = 'none';
        userId = user.uid;
        await syncMyProfile(user);
        
        if (!isAppInitialized) {
            if (!window.history.state) {
                window.history.replaceState({ pageId: 'timeline', postId: null }, '', window.location.href);
            }
            listenGlobalTimeline();
            listenMyNotifications();
            isAppInitialized = true;
        }
    } else {
        // 未ログイン時
        document.getElementById('login-screen').style.display = 'flex';
    }
});


// ==========================================
// 🔗 URLSearchParams と アバター描画の処理
// ==========================================
async function initUrlRoute() {
    const urlParams = new URLSearchParams(window.location.search);
    const postIdParam = urlParams.get('post');
    if (postIdParam) {
        currentSelectedPostId = postIdParam;
        setTimeout(() => { openPostDetail(postIdParam, true); }, 800);
    }
}

function pushHistoryState(pageId, postId = null) {
    const url = new URL(window.location.href);
    if (pageId === 'post-detail' && postId) { url.searchParams.set('post', postId); } 
    else { url.searchParams.delete('post'); }
    window.history.pushState({ pageId, postId }, '', url.toString());
}

window.addEventListener('popstate', (event) => {
    if (event.state) {
        const { pageId, postId } = event.state;
        if (pageId === 'post-detail' && postId) { openPostDetail(postId, true); } 
        else { switchPage(pageId, true); }
    } else {
        switchPage('timeline', true);
    }
});

window.copyPostDirectLink = function() {
    if (!currentSelectedPostId) return;
    const url = new URL(window.location.href);
    url.searchParams.set('post', currentSelectedPostId);
    navigator.clipboard.writeText(url.toString()).then(() => showToast("🔗 ポストのリンクをコピーしました！"));
}

window.backToTimelineFromDetail = function() { switchPage('timeline'); }

// ★ アバターを生成する共通関数（GitHubアイコン対応）
window.renderAvatarHtml = function(uInfo, onClickAction = '') {
    let clickAttr = onClickAction ? `onclick="${onClickAction}; event.stopPropagation();"` : '';
    if (uInfo.avatarUrl) {
        return `<div class="avatar" style="background-image:url('${uInfo.avatarUrl}'); background-size:cover; background-position:center; color:transparent;" ${clickAttr}></div>`;
    }
    return `<div class="avatar" style="background-color:${uInfo.color || '#333'};" ${clickAttr}>${uInfo.name ? uInfo.name[0] : '名'}</div>`;
}

// ==========================================
// 👤 プロフィールデータの同期と取得
// ==========================================
async function syncMyProfile(authUser) {
    const userRef = doc(db, "users", userId);
    const userSnap = await getDoc(userRef);
    
    // GitHubのユーザー名や画像URLを取得
    let githubName = authUser.displayName || authUser.reloadUserInfo?.screenName || "名無し";
    let githubAvatar = authUser.photoURL || "";

    if (userSnap.exists()) {
        myCustomInfo = userSnap.data();
        // 万が一名前が空ならGitHubのもので上書き
        if (!myCustomInfo.name) myCustomInfo.name = githubName;
        // アバターURLは常に最新のGitHubに合わせる
        myCustomInfo.avatarUrl = githubAvatar;
        await updateDoc(userRef, { name: myCustomInfo.name, avatarUrl: myCustomInfo.avatarUrl });
    } else {
        let hash = 0;
        for (let i = 0; i < (userId + todayStr).length; i++) { hash = (userId + todayStr).charCodeAt(i) + ((hash << 5) - hash); }
        const myIndex = Math.abs(hash) % names.length;
        myCustomInfo = { 
            uid: userId,
            name: githubName, 
            color: colors[myIndex], 
            bio: "GitHub連携アカウントです。",
            avatarUrl: githubAvatar,
            following: [],
            updatedAt: Date.now()
        };
        await setDoc(userRef, myCustomInfo);
    }
    globalFollows = myCustomInfo.following || [];
    allUsersCache[userId] = myCustomInfo;
    updateTopHeader();
}

function updateTopHeader() {
    const headerName = document.getElementById('my-today-name');
    if (headerName) {
        headerName.innerText = myCustomInfo.name;
        headerName.style.color = myCustomInfo.color || "#1d9bf0";
    }
}

async function fetchUserInfo(uId) {
    if (allUsersCache[uId]) return allUsersCache[uId];
    try {
        const uSnap = await getDoc(doc(db, "users", uId));
        if (uSnap.exists()) {
            allUsersCache[uId] = uSnap.data();
            return allUsersCache[uId];
        }
    } catch(e) { console.error(e); }
    
    let tHash = 0;
    for (let i = 0; i < (uId + todayStr).length; i++) { tHash = (uId + todayStr).charCodeAt(i) + ((tHash << 5) - tHash); }
    const idx = Math.abs(tHash) % names.length;
    return { name: names[idx], color: colors[idx], bio: "今日限定のアカウントです。", avatarUrl: "" };
}

// ==========================================
// 📡 データ監視・タイムライン・フォロー処理
// ==========================================
function listenGlobalTimeline() {
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"), limit(100));
    onSnapshot(q, async (snapshot) => {
        let posts = [];
        let now = Date.now();
        snapshot.forEach((doc) => {
            let pData = doc.data();
            if ((!pData.expireAt || pData.expireAt > now) && (!pData.scheduleAt || pData.scheduleAt <= now)) {
                posts.push({ postId: doc.id, ...pData });
            }
        });
        
        allPostsCache = posts;
        if (!hasInitialRouted) { hasInitialRouted = true; initUrlRoute(); }
        if (document.getElementById('page-post-detail').classList.contains('active') && currentSelectedPostId) {
            refreshPostDetailInline();
        } else {
            renderTimeline();
        }
    }, (err) => console.error("タイムライン受信エラー:", err));
}

function listenMyNotifications() {
    const q = query(collection(db, "users", userId, "notifications"), orderBy("createdAt", "desc"), limit(30));
    onSnapshot(q, (snapshot) => {
        let notifs = [];
        snapshot.forEach(doc => notifs.push(doc.data()));
        let badge = document.getElementById('notif-badge');
        if (badge && notifs.length > 0 && !document.getElementById('page-notifications').classList.contains('active')) {
            badge.style.display = 'block';
            badge.innerText = notifs.length > 9 ? '9+' : notifs.length;
        }
    });
}

async function incrementViews(postId) {
    if (!postId) return;
    try {
        const postRef = doc(db, "posts", postId);
        const postSnap = await getDoc(postRef);
        if (postSnap.exists()) await updateDoc(postRef, { views: (postSnap.data().views || 0) + 1 });
    } catch (e) {}
}

window.isFollowing = function(targetId) { return globalFollows.includes(targetId); }

window.toggleFollow = async function(targetId) {
    if (targetId === userId) return;
    const myUserRef = doc(db, "users", userId);
    let isNowFollowing = !globalFollows.includes(targetId);
    try {
        if (isNowFollowing) {
            globalFollows.push(targetId);
            await updateDoc(myUserRef, { following: arrayUnion(targetId) });
            showToast(`✅ フォローしました`);
            await addDoc(collection(db, "users", targetId, "notifications"), {
                text: `👤 ${myCustomInfo.name} があなたをフォローしました！`, createdAt: Date.now(), fromId: userId
            });
        } else {
            globalFollows = globalFollows.filter(id => id !== targetId);
            await updateDoc(myUserRef, { following: arrayRemove(targetId) });
            showToast(`フォロー解除しました`);
        }
        updateAllFollowButtons(targetId, isNowFollowing);
        if (currentTimelineTab === 'follow') renderTimeline();
        if (currentProfileId) viewUserProfile(currentProfileId, true);
    } catch (e) { console.error(e); }
}

function updateAllFollowButtons(targetId, nowFollowing) {
    document.querySelectorAll(`[data-follow-target="${targetId}"]`).forEach(btn => {
        if (nowFollowing) { btn.textContent = 'フォロー中'; btn.classList.add('following'); } 
        else { btn.textContent = 'フォロー'; btn.classList.remove('following'); }
    });
    if (currentActiveDmPartnerId === targetId) updateDmFollowBtn();
}

window.linkify = function(text) {
    if (!text) return "";
    let safe = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    safe = safe.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="tweet-link">$1</a>');
    safe = safe.replace(/#([^\s#]+)/g, '<span class="tweet-link" onclick="clickHashtag(\'$1\'); event.stopPropagation();">#$1</span>');
    return safe;
}

window.clickHashtag = function(tag) {
    document.getElementById('search-input').value = `#${tag}`;
    switchPage('search'); executeSearch();
}

let currentSelectedColor = "#1d9bf0";
window.toggleEditProfile = function() {
    const box = document.getElementById('profile-edit-box');
    box.classList.toggle('active');
    if (box.classList.contains('active')) {
        document.getElementById('edit-prof-name').value = myCustomInfo.name;
        document.getElementById('edit-prof-bio').value = myCustomInfo.bio || "";
        currentSelectedColor = myCustomInfo.color || "#1d9bf0";
        renderColorDots();
    }
}

function renderColorDots() {
    const container = document.getElementById('color-picker-dots');
    if(!container) return;
    container.innerHTML = '';
    colors.forEach(c => {
        const isSel = c === currentSelectedColor;
        container.insertAdjacentHTML('beforeend', `<div class="color-dot ${isSel ? 'selected' : ''}" style="background-color:${c};" onclick="selectColorDot('${c}')"></div>`);
    });
}
window.selectColorDot = function(color) { currentSelectedColor = color; renderColorDots(); }

window.saveProfileConfig = async function() {
    const newName = document.getElementById('edit-prof-name').value.trim();
    const newBio = document.getElementById('edit-prof-bio').value.trim();
    if (!newName) return alert("名前を入力してください。");
    myCustomInfo.name = newName;
    myCustomInfo.bio = newBio;
    myCustomInfo.color = currentSelectedColor;
    try {
        await updateDoc(doc(db, "users", userId), { name: newName, bio: newBio, color: currentSelectedColor, updatedAt: Date.now() });
        allUsersCache[userId] = myCustomInfo;
        toggleEditProfile(); updateTopHeader(); viewUserProfile(userId); renderTimeline();
        showToast('✅ プロフィールを更新しました');
    } catch(e) { console.error(e); }
}

window.switchTimelineTab = function(tab) {
    currentTimelineTab = tab;
    ['all', 'follow', 'rank'].forEach(t => document.getElementById(`tab-${t}`)?.classList.toggle('active', t === tab));
    renderTimeline();
}

window.renderTimeline = async function() {
    const list = document.getElementById('tweet-list');
    if (!list) return;
    list.innerHTML = '';
    let posts = [...allPostsCache];

    if (currentTimelineTab === 'follow') posts = posts.filter(p => globalFollows.includes(p.id) || p.id === userId);
    else if (currentTimelineTab === 'rank') posts.sort((a, b) => ((b.likes?.length || 0) + (b.views || 0)) - ((a.likes?.length || 0) + (a.views || 0)));

    if (posts.length === 0) {
        list.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted);">ポストはありません</div>`;
        renderWidgets(); return;
    }

    for (let p of posts) {
        let uInfo = await fetchUserInfo(p.id);
        let isLiked = p.likes?.includes(userId) ? 'liked' : '';
        let isDisliked = p.dislikes?.includes(userId) ? 'disliked' : '';
        let isFucked = p.fucks?.includes(userId) ? 'fucked' : '';
        let isOther = p.id !== userId;
        let following = isFollowing(p.id);

        let mediaHtml = "";
        if (p.media?.src) {
            if (p.media.type === 'image') mediaHtml = `<div class="attached-media"><img src="${p.media.src}"></div>`;
            if (p.media.type === 'video') mediaHtml = `<div class="attached-media"><video src="${p.media.src}" controls></video></div>`;
            if (p.media.type === 'audio') mediaHtml = `<div class="attached-media"><audio src="${p.media.src}" controls></audio></div>`;
        }

        let pollHtml = "";
        if (p.poll?.options) {
            let totalVotes = p.poll.votes ? Object.values(p.poll.votes).length : 0;
            pollHtml = `<div class="poll-display-container" onclick="event.stopPropagation();">`;
            p.poll.options.forEach((opt, oIdx) => {
                let optionVotes = p.poll.votes ? Object.values(p.poll.votes).filter(v => v === oIdx).length : 0;
                let pct = totalVotes > 0 ? Math.round((optionVotes / totalVotes) * 100) : 0;
                pollHtml += `<div class="poll-row" onclick="votePoll('${p.postId}', ${oIdx})"><div class="poll-bg-bar" style="width:${pct}%;"></div><span class="poll-text">${opt}</span><span class="poll-pct">${pct}%</span></div>`;
            });
            pollHtml += `<div style="font-size:12px; color:var(--text-muted); margin-top:4px;">📊 投票数: ${totalVotes}票</div></div>`;
        }

        let quoteHtml = "";
        if (p.quoteId) {
            let qPost = allPostsCache.find(ap => ap.postId === p.quoteId);
            if (qPost) {
                let qInfo = await fetchUserInfo(qPost.id);
                quoteHtml = `<div class="embedded-quote-card" onclick="openPostDetail('${qPost.postId}'); event.stopPropagation();"><span class="user-name" style="font-size:13px;">${qInfo.name}</span><span class="meta-info" style="font-size:12px;">@${qPost.id}</span><div class="message-text" style="font-size:14px; margin-top:4px;">${linkify(qPost.text)}</div></div>`;
            }
        }

        let inlineActions = '';
        if (isOther) {
            inlineActions = `
                <div style="display:flex; gap:6px; margin-top:6px;" onclick="event.stopPropagation();">
                    <button class="inline-dm-btn" onclick="startDmWith('${p.id}')">📨 DM</button>
                    <button class="inline-action-btn ${following ? 'following' : ''}" data-follow-target="${p.id}" onclick="toggleFollow('${p.id}')">${following ? 'フォロー中' : 'フォロー'}</button>
                </div>`;
        }

        list.insertAdjacentHTML('beforeend', `
            <div class="item-row" onclick="openPostDetail('${p.postId}')">
                ${renderAvatarHtml(uInfo, `viewUserProfile('${p.id}')`)}
                <div class="content-body">
                    <div>
                        <span class="user-name" onclick="viewUserProfile('${p.id}'); event.stopPropagation();">${uInfo.name}</span>
                        <span class="meta-info">@${p.id} · ${new Date(p.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="message-text">${linkify(p.text)}</div>
                    ${mediaHtml}${pollHtml}${quoteHtml}
                    ${inlineActions}
                    <div class="action-bar" onclick="event.stopPropagation();">
                        <div class="action-btn" onclick="openPostDetail('${p.postId}')">💬 <span>${p.replies?.length || 0}</span></div>
                        <div class="action-btn" onclick="quoteTweet('${p.postId}')">🔄</div>
                        <div class="action-btn ${isLiked}" onclick="handleReaction('${p.postId}', 'like')">❤️ <span>${p.likes?.length || 0}</span></div>
                        <div class="action-btn ${isDisliked}" onclick="handleReaction('${p.postId}', 'dislike')">💙 <span>${p.dislikes?.length || 0}</span></div>
                        <div class="action-btn ${isFucked}" onclick="handleReaction('${p.postId}', 'fuck')">🖕 <span>${p.fucks?.length || 0}</span></div>
                        <div class="action-views">👁️ ${p.views || 0}</div>
                    </div>
                </div>
            </div>
        `);
    }
    renderWidgets();
}

function renderWidgets() {
    const wThreads = document.getElementById('widget-threads');
    if (wThreads) {
        wThreads.innerHTML = '';
        allPostsCache.slice(0, 3).forEach(p => wThreads.insertAdjacentHTML('beforeend', `<div class="widget-item" onclick="openPostDetail('${p.postId}')">📌 ${p.text || '[メディア]'}</div>`));
    }
    const wReplies = document.getElementById('widget-replies');
    if (wReplies) {
        wReplies.innerHTML = '';
        let allReplies = [];
        allPostsCache.forEach(p => { if (p.replies) p.replies.forEach(r => allReplies.push({ postId: p.postId, text: r.text })); });
        allReplies.slice(0, 5).forEach(r => wReplies.insertAdjacentHTML('beforeend', `<div class="widget-item" onclick="openPostDetail('${r.postId}')">↳ ${r.text}</div>`));
    }
}

window.submitTweet = async function() {
    const txtArea = document.getElementById('tweet-input');
    let text = txtArea.value.trim();
    let pollOptions = [];
    for (let i = 1; i <= 4; i++) {
        let v = document.getElementById(`poll-opt-${i}`).value.trim();
        if (v) pollOptions.push(v);
    }
    if (!text && !attachedMediaData.src && pollOptions.length === 0) return;

    let expireMinutes = parseInt(document.getElementById('post-expire-minutes').value);
    let expireAt = expireMinutes ? Date.now() + (expireMinutes * 60 * 1000) : Date.now() + (24 * 60 * 60 * 1000);
    let scheduleTime = document.getElementById('post-schedule-time').value;
    let scheduleAt = scheduleTime ? new Date(scheduleTime).getTime() : null;
    let genPostId = 'post_' + Date.now() + '_' + Math.floor(Math.random() * 1000);

    let newPost = {
        postId: genPostId, id: userId, text: text, createdAt: Date.now(), expireAt: expireAt, scheduleAt: scheduleAt,
        media: attachedMediaData.src ? { ...attachedMediaData } : null,
        poll: pollOptions.length > 0 ? { options: pollOptions, votes: {} } : null,
        quoteId: selectedQuotePostId || null, likes: [], dislikes: [], fucks: [], views: 0, replies: []
    };

    try {
        await setDoc(doc(db, "posts", genPostId), newPost);
        allPostsCache.unshift(newPost);
        renderTimeline();
        txtArea.value = ''; clearSelectedMedia(); cancelQuote(); togglePollCreator(true);
        for (let i = 1; i <= 4; i++) document.getElementById(`poll-opt-${i}`).value = '';
        document.getElementById('post-expire-minutes').value = ''; document.getElementById('post-schedule-time').value = '';
        showToast('✅ 世界にポストを公開しました！');
    } catch(e) { console.error(e); alert("公開に失敗しました。詳細: " + e.message); }
}

window.handleReaction = async function(postId, type) {
    try {
        const postRef = doc(db, "posts", postId);
        const pSnap = await getDoc(postRef);
        if(!pSnap.exists()) return;
        let p = pSnap.data();

        if (type === 'like') {
            let likes = p.likes || [];
            if (likes.includes(userId)) await updateDoc(postRef, { likes: arrayRemove(userId) });
            else {
                await updateDoc(postRef, { likes: arrayUnion(userId) });
                await addDoc(collection(db, "users", p.id, "notifications"), { text: `❤️ ${myCustomInfo.name} がいいねしました`, createdAt: Date.now(), fromId: userId });
            }
        } else if (type === 'dislike') {
            let dislikes = p.dislikes || [];
            if (dislikes.includes(userId)) await updateDoc(postRef, { dislikes: arrayRemove(userId) }); else await updateDoc(postRef, { dislikes: arrayUnion(userId) });
        } else if (type === 'fuck') {
            let fucks = p.fucks || [];
            if (fucks.includes(userId)) await updateDoc(postRef, { fucks: arrayRemove(userId) }); else await updateDoc(postRef, { fucks: arrayUnion(userId) });
        }
    } catch(e) {}
}

window.votePoll = async function(postId, optIdx) {
    try { await updateDoc(doc(db, "posts", postId), { [`poll.votes.${userId}`]: optIdx }); } catch(e) {}
}

}

window.clearSelectedMedia = function() { attachedMediaData = { type: "", src: "" }; document.getElementById('media-preview-wrap').classList.remove('active'); document.getElementById('media-upload-input').value = ""; }

window.submitReply = async function() {

async function refreshPostDetailInline() {
    if (!currentSelectedPostId) return;
    try {
        const pSnap = await getDoc(doc(db, "posts", currentSelectedPostId));
        if (!pSnap.exists()) { document.getElementById('detail-main-post').innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted);">存在しないか消滅しました。</div>`; return; }
        let p = { postId: pSnap.id, ...pSnap.data() };
        let uInfo = await fetchUserInfo(p.id);
        let isLiked = p.likes?.includes(userId) ? 'liked' : '';
        let isDisliked = p.dislikes?.includes(userId) ? 'disliked' : '';
        let isFucked = p.fucks?.includes(userId) ? 'fucked' : '';
        let isOther = p.id !== userId;
        let following = isFollowing(p.id);

        let mediaHtml = "";
        if (p.media?.src) {
            if (p.media.type === 'image') mediaHtml = `<div class="attached-media"><img src="${p.media.src}"></div>`;
            else if (p.media.type === 'video') mediaHtml = `<div class="attached-media"><video src="${p.media.src}" controls></video></div>`;
            else if (p.media.type === 'audio') mediaHtml = `<div class="attached-media"><audio src="${p.media.src}" controls></audio></div>`;
        }

        let pollHtml = "";
        if (p.poll?.options) {
            let totalVotes = p.poll.votes ? Object.values(p.poll.votes).length : 0;
            pollHtml = `<div class="poll-display-container">`;
            p.poll.options.forEach((opt, oIdx) => {
                let optionVotes = p.poll.votes ? Object.values(p.poll.votes).filter(v => v === oIdx).length : 0;
                let pct = totalVotes > 0 ? Math.round((optionVotes / totalVotes) * 100) : 0;
                pollHtml += `<div class="poll-row" onclick="votePoll('${p.postId}', ${oIdx})"><div class="poll-bg-bar" style="width:${pct}%;"></div><span class="poll-text">${opt}</span><span class="poll-pct">${pct}%</span></div>`;
            });
            pollHtml += `<div style="font-size:12px; color:var(--text-muted); margin-top:4px;">📊 投票数: ${totalVotes}票</div></div>`;
        }

        let detailActions = '';
        if (isOther) {
            detailActions = `
                <div style="display:flex; gap:8px; margin-top:8px;">
                    <button class="btn-dm" style="font-size:13px; padding:6px 14px;" onclick="startDmWith('${p.id}')">📨 DM送信</button>
                    <button class="btn-follow ${following ? 'following' : ''}" data-follow-target="${p.id}" onclick="toggleFollow('${p.id}')">${following ? 'フォロー中' : '＋ フォロー'}</button>
                </div>`;
        }

        document.getElementById('detail-main-post').innerHTML = `
            <div class="item-row" style="cursor:default; border-bottom:2px solid var(--border-color);">
                ${renderAvatarHtml(uInfo, `viewUserProfile('${p.id}')`)}
                <div class="content-body">
                    <div><span class="user-name" onclick="viewUserProfile('${p.id}')">${uInfo.name}</span><span class="meta-info">@${p.id}</span></div>
                    <div class="message-text" style="font-size:18px; margin:12px 0;">${linkify(p.text)}</div>
                    ${mediaHtml}${pollHtml}
                    ${detailActions}
                    <div class="meta-info" style="padding:8px 0; border-top:1px solid #222; margin-top:8px;">${new Date(p.createdAt).toLocaleString()} · 👁️ ${p.views || 0} 回表示</div>
                    <div class="action-bar" style="border-top:1px solid #222; padding-top:8px; max-width:100%;">
                        <div class="action-btn" onclick="quoteTweet('${p.postId}')">🔄 引用</div>
                        <div class="action-btn ${isLiked}" onclick="handleReaction('${p.postId}', 'like')">❤️ <span>${p.likes?.length || 0}</span></div>
                        <div class="action-btn ${isDisliked}" onclick="handleReaction('${p.postId}', 'dislike')">💙 <span>${p.dislikes?.length || 0}</span></div>
                        <div class="action-btn ${isFucked}" onclick="handleReaction('${p.postId}', 'fuck')">🖕 <span>${p.fucks?.length || 0}</span></div>
                    </div>
                </div>
            </div>`;

        const rList = document.getElementById('detail-replies-list');
        rList.innerHTML = '';
        if (p.replies && p.replies.length > 0) {
            for (let r of p.replies) {
                let rInfo = await fetchUserInfo(r.id);
                let rOther = r.id !== userId;
                let rFollowing = isFollowing(r.id);
                rList.insertAdjacentHTML('beforeend', `
                    <div class="item-row reply-row">
                        ${renderAvatarHtml(rInfo, `viewUserProfile('${r.id}')`)}
                        <div class="content-body">
                            <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                                <span class="user-name" onclick="viewUserProfile('${r.id}')">${rInfo.name}</span>
                                <span class="meta-info">@${r.id}</span>
                                ${rOther ? `<button class="inline-dm-btn" onclick="startDmWith('${r.id}'); event.stopPropagation()">📨</button><button class="inline-action-btn ${rFollowing ? 'following' : ''}" data-follow-target="${r.id}" onclick="toggleFollow('${r.id}'); event.stopPropagation()">${rFollowing ? 'フォロー中' : 'フォロー'}</button>` : ''}
                            </div>
                            <div class="message-text" style="font-size:14px;">${linkify(r.text)}</div>
                        </div>
                    </div>`);
            }
        } else { rList.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-muted); font-size:13px;">まだ返信はありません</div>`; }
    } catch(e) {}
}

window.startDmWith = function(targetId) { currentActiveDmPartnerId = targetId; switchPage('dm-chat'); }

window.renderRoomList = async function() {
    const container = document.getElementById('room-list-container');
    if (!container) return;
    container.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-muted);">読み込み中...</div>`;

    try {
        const qMeSender = query(collection(db, "dms"), where("sender", "==", userId));
        const qMeReceiver = query(collection(db, "dms"), where("receiver", "==", userId));
        const [snap1, snap2] = await Promise.all([getDocs(qMeSender), getDocs(qMeReceiver)]);
        let partners = new Map();

        const processDoc = (docSnap) => {
            let m = docSnap.data(); let pId = m.sender === userId ? m.receiver : m.sender;
            if (pId !== userId) { if (!partners.has(pId) || m.createdAt > partners.get(pId).createdAt) partners.set(pId, m); }
        };
        snap1.forEach(processDoc); snap2.forEach(processDoc);

        container.innerHTML = '';
        if (partners.size === 0) { container.insertAdjacentHTML('beforeend', `<div style="padding:40px; text-align:center; color:var(--text-muted); font-size:14px;">まだDM履歴がありません。</div>`); return; }

        let sortedPartners = Array.from(partners.entries()).sort((a,b) => b[1].createdAt - a[1].createdAt);

        for (let [pId, lastMsg] of sortedPartners) {
            let partnerInfo = await fetchUserInfo(pId);
            let following = isFollowing(pId);
            container.insertAdjacentHTML('beforeend', `
                <div class="item-row">
                    ${renderAvatarHtml(partnerInfo, `viewUserProfile('${pId}')`)}
                    <div class="content-body" onclick="startDmWith('${pId}')">
                        <div><span class="user-name">${partnerInfo.name}</span><span class="meta-info" style="font-size:12px;">@${pId}</span></div>
                        <div class="message-text" style="color:var(--text-muted); font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${lastMsg.text || '[メディア]'}</div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:6px; align-items:flex-end; flex-shrink:0;">
                        <button class="inline-action-btn ${following ? 'following' : ''}" data-follow-target="${pId}" onclick="toggleFollow('${pId}'); event.stopPropagation()">${following ? 'フォロー中' : 'フォロー'}</button>
                        <button class="inline-dm-btn" onclick="startDmWith('${pId}'); event.stopPropagation()">チャット →</button>
                    </div>
                </div>`);
        }
    } catch (e) {}
}

window.updateDmFollowBtn = function() {

window.renderDmChat = async function() {
    if (!currentActiveDmPartnerId) return;
    if (dmUnsubscribe) { dmUnsubscribe(); dmUnsubscribe = null; }
    
    let partnerInfo = await fetchUserInfo(currentActiveDmPartnerId);
    document.getElementById('dm-chat-title').innerText = partnerInfo.name;
    document.getElementById('dm-chat-subtitle').innerText = `@${currentActiveDmPartnerId}`;

    const avatarEl = document.getElementById('dm-chat-avatar');

        if(partnerInfo.avatarUrl) {
            avatarEl.style.backgroundImage = `url('${partnerInfo.avatarUrl}')`;
            avatarEl.style.backgroundSize = 'cover';
            avatarEl.innerText = '';
        } else {
            avatarEl.style.backgroundImage = 'none';
            avatarEl.style.backgroundColor = partnerInfo.color || '#333';
            avatarEl.textContent = partnerInfo.name[0];
        }
    }

    updateDmFollowBtn();

    const q = query(collection(db, "dms"), where("roomId", "==", roomId), orderBy("createdAt", "asc"));
    
    dmUnsubscribe = onSnapshot(q, (snapshot) => {

        if (snapshot.empty) { box.innerHTML = `<div style="text-align:center; color:var(--text-muted); font-size:14px; margin-top:40px;">まだメッセージはありません。</div>`; return; }
        snapshot.forEach(docSnap => {
            let m = docSnap.data();
            let isMe = m.sender === userId;
            let timeStr = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            box.insertAdjacentHTML('beforeend', `

                    <div>${linkify(m.text)}</div>

        tgtFollowersCount = snapFollowers.size;
        document.getElementById('prof-following-count').textContent = targetFollowsCount;
        document.getElementById('prof-followers-count').textContent = tgtFollowersCount;
    } catch(e) {}

    const actArea = document.getElementById('profile-action-area');
    if (actArea) {
        actArea.innerHTML = '';
        if (targetId === userId) {
            actArea.innerHTML = `<button class="btn-primary" style="background:#222; font-size:13px; border:1px solid var(--border-color);" onclick="toggleEditProfile()">✏️ プロフ編集</button>`;
        } else {
            let following = isFollowing(targetId);
            actArea.innerHTML = `
                <button class="btn-dm" onclick="startDmWith('${targetId}')">📨 DM</button>
                <button class="btn-follow ${following ? 'following' : ''}" data-follow-target="${targetId}" onclick="toggleFollow('${targetId}')">${following ? 'フォロー中' : '＋ フォロー'}</button>`;
        }
    }

    const pList = document.getElementById('prof-tweets-list');
    pList.innerHTML = '';
    let posts = allPostsCache.filter(p => p.id === targetId);

    if (posts.length === 0) { pList.innerHTML = `<div style="padding:40px; text-align:center; color:var(--text-muted); font-size:14px;">まだポストしていません</div>`; return; }
    posts.forEach(p => {
        pList.insertAdjacentHTML('beforeend', `
            <div class="item-row" onclick="openPostDetail('${p.postId}')">
                ${renderAvatarHtml(uInfo)}
                <div class="content-body">
                    <div><span class="user-name">${uInfo.name}</span><span class="meta-info">@${p.id}</span></div>
                    <div class="message-text">${linkify(p.text)}</div>
                </div>
            </div>`);
    });
}

window.switchPage = function(pageId, isPopState = false) {
    if (dmUnsubscribe && pageId !== 'dm-chat' && pageId !== 'page-dm-chat') { dmUnsubscribe(); dmUnsubscribe = null; }
    let targetPage = pageId.startsWith('page-') ? pageId : 'page-' + pageId;
    if (!isPopState && targetPage !== 'page-post-detail') { currentSelectedPostId = ""; pushHistoryState(pageId.replace('page-', '')); }

    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pDom = document.getElementById(targetPage);
    if (pDom) pDom.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    let navName = targetPage.replace('page-', 'nav-');
    if (targetPage === 'page-post-detail') navName = 'nav-timeline';
    document.getElementById(navName)?.classList.add('active');

    if (targetPage === 'page-timeline') renderTimeline();
    if (targetPage === 'page-dm') renderRoomList();
    if (targetPage === 'page-dm-chat') renderDmChat();
    if (targetPage === 'page-notifications') renderNotifications();
    window.scrollTo({ top: 0 });
}

window.previewMedia = function(input) {
    if (input.files?.[0]) {
        const file = input.files[0]; const reader = new FileReader();
        reader.onload = function(e) {
            const src = e.target.result; const previewContent = document.getElementById('preview-content');
            if (!previewContent) return;
            previewContent.innerHTML = '';
            if (file.type.startsWith('image/')) { attachedMediaData = { type: 'image', src }; previewContent.innerHTML = `<img src="${src}">`; }
            else if (file.type.startsWith('video/')) { attachedMediaData = { type: 'video', src }; previewContent.innerHTML = `<video src="${src}" controls></video>`; }
            else if (file.type.startsWith('audio/')) { attachedMediaData = { type: 'audio', src }; previewContent.innerHTML = `<audio src="${src}" controls></audio>`; }
            document.getElementById('media-preview-wrap').classList.add('active');
        };
        reader.readAsDataURL(file);
    }
}

window.toggleVoiceRecording = async function() {
    const recordBtn = document.getElementById('voice-record-btn');
    if (!isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream); audioChunks = [];
            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    const base64Audio = reader.result; attachedMediaData = { type: 'audio', src: base64Audio };
                    document.getElementById('preview-content').innerHTML = `<audio src="${base64Audio}" controls></audio>`;
                    document.getElementById('media-preview-wrap').classList.add('active');
                };
                reader.readAsDataURL(audioBlob); stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start(); isRecording = true; recordBtn.classList.add('recording'); recordBtn.innerText = "🛑";
        } catch (err) { alert("マイクの許可が必要です: " + err); }
    } else {
        if (mediaRecorder && isRecording) { mediaRecorder.stop(); isRecording = false; recordBtn.classList.remove('recording'); recordBtn.innerText = "🎙️"; }
    }
}
</script>
